<div class="w-full flex flex-col bg-brand-cream pb-20">
    
    <!-- Hero Header Galerie -->
    <div class="relative w-full h-[50vh] flex items-center justify-center bg-brand-navy overflow-hidden">
        <div class="absolute inset-0 w-full h-full">
            <img src="assets/gallery/IMG_0475.jpg" class="w-full h-full object-cover opacity-40" alt="Galerie de sourires">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-brand-navy via-transparent to-transparent"></div>
        <div class="relative z-10 text-center px-6">
            <span class="text-brand-gold uppercase tracking-[0.2em] font-semibold text-sm mb-4 block">Résultats</span>
            <h1 class="text-5xl md:text-6xl font-bold text-white font-heading mb-4 drop-shadow-md">L'Art du Sourire</h1>
            <p class="text-gray-200 text-lg md:text-xl font-light max-w-2xl mx-auto">
                Découvrez la transformation de nos patients. L'excellence de notre cabinet en images.
            </p>
        </div>
    </div>

    <!-- Instructions -->
    <div class="w-full text-center py-12 px-6">
        <div class="inline-flex items-center gap-3 bg-white px-8 py-4 rounded-full shadow-md border border-gray-100">
            <span class="icon-[lucide--sliders-horizontal] text-brand-gold text-2xl"></span>
            <span class="text-brand-navy font-medium text-lg">Glissez les curseurs sur les images pour visualiser les résultats Avant - Après</span>
        </div>
    </div>
