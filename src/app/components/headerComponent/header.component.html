<header 
    class="sticky top-0 z-50 flex justify-between items-center px-8 transition-all duration-500"
    [ngClass]="isScrolled ? 'h-16 bg-white/95 backdrop-blur-md shadow-lg py-2' : 'h-24 bg-white py-4'"
>
    <!-- Logo -->
    <div class="flex-1 flex items-center">
        <a routerLink="/" class="flex items-center h-full transition-all duration-500">
            <img 
                src="assets/logos/logo001 - Copy.png" 
                [ngClass]="isScrolled ? 'max-h-12' : 'max-h-16'"
                class="w-auto object-contain transition-all duration-500" 
                alt="Dr Riadh Rjili Logo"
            >
        </a>
    </div>

    <!-- Navigation -->
    <nav class="hidden md:flex gap-8 lg:gap-10 items-center justify-center" aria-label="Navigation principale">
        <a class="text-brand-navy font-semibold hover:text-brand-gold transition-colors text-[11px] lg:text-sm uppercase tracking-wider" routerLink="/" routerLinkActive="text-brand-gold" [routerLinkActiveOptions]="{exact: true}">Accueil</a>
        <a class="text-brand-navy font-semibold hover:text-brand-gold transition-colors text-[11px] lg:text-sm uppercase tracking-wider" routerLink="/traitements" routerLinkActive="text-brand-gold">Traitements</a>
        <a class="text-brand-navy font-semibold hover:text-brand-gold transition-colors text-[11px] lg:text-sm uppercase tracking-wider" routerLink="/galerie" routerLinkActive="text-brand-gold">Galerie</a>
        <a class="text-brand-navy font-semibold hover:text-brand-gold transition-colors text-[11px] lg:text-sm uppercase tracking-wider" routerLink="/conseils" routerLinkActive="text-brand-gold">Conseils</a>
        <a class="text-brand-navy font-semibold hover:text-brand-gold transition-colors text-[11px] lg:text-sm uppercase tracking-wider" routerLink="/questions-frequentes" routerLinkActive="text-brand-gold">FAQ</a>
        <a class="text-brand-navy font-semibold hover:text-brand-gold transition-colors text-[11px] lg:text-sm uppercase tracking-wider" routerLink="/contact" routerLinkActive="text-brand-gold">Contact</a>
    </nav>

    <!-- Call to Action & Mobile Toggle -->
    <div class="flex-1 flex items-center justify-end gap-2 md:gap-4">
        <a href="https://www.med.tn/rendez-vous/dr-riadh-rjili/227277" target="_blank" 
            class="btn-primary-custom px-4 md:px-6 transition-all duration-500 whitespace-nowrap"
            [ngClass]="isScrolled ? 'py-1.5 md:py-2 text-[10px] md:text-xs' : 'py-2.5 md:py-3 text-xs md:text-sm'"
        >
            RDV
        </a>
        <!-- Mobile Menu Button -->
        <button (click)="toggleMenu()" class="md:hidden text-brand-navy p-1">
            <span [class]="isMenuOpen ? 'icon-[lucide--x]' : 'icon-[lucide--menu]'" class="text-3xl"></span>
        </button>
    </div>

    <!-- Mobile Menu Overlay -->
    <div 
        class="fixed inset-0 bg-brand-navy z-[60] flex flex-col items-center justify-center gap-8 transition-all duration-500 md:hidden"
        [ngClass]="isMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none translate-x-full'"
    >
        <button (click)="closeMenu()" class="absolute top-6 right-8 text-brand-gold">
            <span class="icon-[lucide--x] text-4xl"></span>
        </button>

        <nav class="flex flex-col items-center gap-8" aria-label="Navigation mobile">
            <a (click)="closeMenu()" routerLink="/" class="text-2xl font-bold text-white hover:text-brand-gold transition-colors">Accueil</a>
            <a (click)="closeMenu()" routerLink="/traitements" class="text-2xl font-bold text-white hover:text-brand-gold transition-colors">Traitements</a>
            <a (click)="closeMenu()" routerLink="/galerie" class="text-2xl font-bold text-white hover:text-brand-gold transition-colors">Galerie</a>
            <a (click)="closeMenu()" routerLink="/conseils" class="text-2xl font-bold text-white hover:text-brand-gold transition-colors">Conseils</a>
            <a (click)="closeMenu()" routerLink="/questions-frequentes" class="text-2xl font-bold text-white hover:text-brand-gold transition-colors">FAQ</a>
            <a (click)="closeMenu()" routerLink="/contact" class="text-2xl font-bold text-white hover:text-brand-gold transition-colors">Contact</a>
        </nav>

        <div class="mt-8">
            <a (click)="closeMenu()" href="https://www.med.tn/rendez-vous/dr-riadh-rjili/227277" target="_blank" class="btn-primary-custom px-10 py-4">Prendre RDV sur Med.tn</a>
        </div>
    </div>
</header>
