<div class="card w-full h-full rounded-lg">
    <div class="card-body p-0">
        <div class="diff aspect-video w-full h-full rounded-lg">
            <div class="diff-item-1">
                <img alt="right" [src]="right" />
            </div>
            <div class="diff-item-2">
                <img alt="left" [src]="left" />
            </div>
            <div class="diff-resizer w-[50cqi]">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-brand-gold rounded-full flex items-center justify-center shadow-lg border-2 border-white z-10">
                    <span class="icon-[ph--tooth-bold] text-white text-xl"></span>
                </div>
            </div>
        </div>
    </div>
</div>
