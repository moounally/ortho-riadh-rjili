<div class="relative w-full aspect-[4/3] md:aspect-video overflow-hidden rounded-2xl shadow-xl border border-white group">
    <!-- Image de fond (Après) -->
    <img [src]="right" class="absolute inset-0 w-full h-full object-cover" alt="Après">
    
    <!-- Image de dessus (Avant) avec découpe dynamique -->
    <div class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none" [style.width.%]="sliderValue">
        <img [src]="left" 
             class="absolute inset-0 w-full h-full object-cover max-w-none" 
             [style.width]="containerWidth + 'px'"
             alt="Avant">
    </div>

    <!-- Input invisible pour le contrôle (Tactile & Souris) -->
    <input type="range" min="0" max="100" 
           [(ngModel)]="sliderValue" 
           (input)="onResize()"
           class="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-30">

    <!-- Ligne de séparation et icône dentée -->
    <div class="absolute top-0 bottom-0 w-1 bg-white/50 backdrop-blur-sm z-20 pointer-events-none shadow-[0_0_15px_rgba(0,0,0,0.3)]" 
         [style.left.%]="sliderValue">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-brand-gold rounded-full flex items-center justify-center shadow-2xl border-2 border-white transition-transform duration-300 group-hover:scale-110">
            <span class="icon-[ph--tooth-bold] text-white text-xl"></span>
        </div>
        <!-- Labels informatifs (Optionnel, masqués sur mobile) -->
        <div class="absolute top-4 left-4 bg-black/50 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-md uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Avant</div>
        <div class="absolute top-4 right-4 bg-black/50 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-md uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Après</div>
    </div>
</div>
