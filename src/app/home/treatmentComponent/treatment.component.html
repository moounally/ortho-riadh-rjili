<div class="w-full flex flex-col items-center py-16 bg-brand-cream relative overflow-hidden">
    
    <!-- Decorative background elements -->
    <div class="absolute top-20 -right-16 opacity-[0.03] rotate-45 pointer-events-none">
        <span class="icon-[ph--tooth-bold] text-[250px] text-brand-navy"></span>
    </div>
    <div class="absolute bottom-10 -left-16 opacity-[0.03] -rotate-12 pointer-events-none">
        <span class="icon-[ph--tooth-bold] text-[200px] text-brand-navy"></span>
    </div>
    
    <div class="text-center mb-12">
        <span class="text-brand-gold uppercase tracking-[0.2em] font-semibold text-sm mb-2 block">Solutions Adaptées</span>
        <h2 class="text-4xl md:text-5xl font-bold text-brand-navy">Nos Traitements</h2>
        <p class="text-gray-500 mt-4 max-w-2xl mx-auto font-light">Une approche personnalisée pour chaque étape de la vie.</p>
    </div>

    <!-- Luxury Tab Switcher -->
    <div class="flex flex-row justify-center gap-2 md:gap-4 mb-10 md:mb-16 bg-white p-1 md:p-2 rounded-full shadow-lg border border-gray-100 max-w-[95%] overflow-x-auto no-scrollbar">
        <button 
            class="px-4 md:px-8 py-2 md:py-3 rounded-full text-xs md:text-base font-medium transition-all duration-300 flex items-center gap-1 md:gap-2 whitespace-nowrap"
            [class]="tab === 'child' ? 'bg-brand-navy text-brand-gold shadow-md' : 'text-gray-500 hover:text-brand-navy hover:bg-gray-50'"
            (click)="switchTab('child')">
            <span class="icon-[ph--baby-bold] text-lg md:text-xl"></span>
            Enfants
        </button>
        <button 
            class="px-4 md:px-8 py-2 md:py-3 rounded-full text-xs md:text-base font-medium transition-all duration-300 flex items-center gap-1 md:gap-2 whitespace-nowrap"
            [class]="tab === 'teenager' ? 'bg-brand-navy text-brand-gold shadow-md' : 'text-gray-500 hover:text-brand-navy hover:bg-gray-50'"
            (click)="switchTab('teenager')">
            <span class="icon-[ph--student-bold] text-lg md:text-xl"></span>
            Ados
        </button>
        <button 
            class="px-4 md:px-8 py-2 md:py-3 rounded-full text-xs md:text-base font-medium transition-all duration-300 flex items-center gap-1 md:gap-2 whitespace-nowrap"
            [class]="tab === 'adult' ? 'bg-brand-navy text-brand-gold shadow-md' : 'text-gray-500 hover:text-brand-navy hover:bg-gray-50'"
            (click)="switchTab('adult')">
            <span class="icon-[ph--briefcase-bold] text-lg md:text-xl"></span>
            Adultes
        </button>
    </div>
    
    <div class="w-full max-w-6xl mx-auto px-6">
        @switch (tab) {
        @case ('child') {
        <div class="animate-fade-in">
            <child-treatment-component></child-treatment-component>
        </div>
        }
        @case ('teenager') {
        <div class="animate-fade-in">
            <teenager-treatment-component></teenager-treatment-component>
        </div>
        }
        @case ('adult') {
        <div class="animate-fade-in">
            <adult-treatment-component></adult-treatment-component>
        </div>
        }
        }
    </div>
</div>
